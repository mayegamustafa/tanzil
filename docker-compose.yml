version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tanzeel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tanzeel
      POSTGRES_PASSWORD: tanzeel_secret
      POSTGRES_DB: tanzeel_travels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tanzeel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tanzeel_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
